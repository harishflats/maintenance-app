<div class="login-container">
  <div class="login-card">
    <h1>Apartment Maintenance</h1>
    <p class="subtitle">Select your role to continue</p>

    <div class="button-container">
      <div *ngIf="!isAdminUnlocked" class="admin-access-card">
        <span class="admin-access-title">Admin Access</span>
        <input
          type="password"
          [(ngModel)]="adminPassword"
          (keyup.enter)="unlockAdmin()"
          placeholder="Enter Password"
        />
        <button class="btn btn-primary" (click)="unlockAdmin()">
          <div class="btn-text">🔒 Unlock Admin</div>
        </button>
      </div>

      <button *ngIf="isAdminUnlocked" class="btn btn-secondary-success" (click)="loginAsAdmin()">
        <div class="btn-icon">🔓</div>
        <div class="btn-text">Enter Admin Panel</div>
        <div class="btn-desc">Manage finances</div>
      </button>

      <button class="btn btn-secondary" (click)="loginAsUser()">
        <div class="btn-icon">👁️</div>
        <div class="btn-text">User</div>
        <div class="btn-desc">View only</div>
      </button>
    </div>

    <p class="footer-text">Password required for Admin • User is view-only</p>
  </div>
</div>
